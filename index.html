<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0f1923;--navy2:#1a2a3a;--gold:#c8a45a;--gold2:#e8c47a;--border:#e2e8f0;--bg:#f4f6f9;--surface:#fff;--text:#1a202c;--muted:#718096;--green:#276749;--green-bg:#f0fff4;--amber:#92400e;--amber-bg:#fffbeb;--red:#9b1c1c;--red-bg:#fff5f5;--blue:#1e3a5f;--blue-bg:#ebf4ff;--purple:#44337a;--purple-bg:#faf5ff;--purple-border:#d6bcfa;--r:6px;--rlg:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy);padding:20px}
.lcard{background:#fff;border-radius:16px;padding:40px;width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.llogo{width:64px;height:64px;object-fit:contain;border-radius:8px;margin:0 auto 16px}
.lco{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:2px}
.ltag{font-size:10px;color:var(--gold);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px}
.ldiv{height:1px;background:var(--border);margin:20px 0}
.fr{margin-bottom:11px;text-align:left}
.fr label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.fr input{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r);outline:none}
.fr input:focus{border-color:var(--navy)}
.lbtn{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:4px}
.lbtn:hover{background:var(--navy2)}
.lerr{background:var(--red-bg);border:1px solid #fed7d7;color:var(--red);border-radius:var(--r);padding:9px 12px;font-size:12px;margin-top:10px;display:none;text-align:left}
#app{display:none}
.wrap{max-width:1600px;margin:0 auto;padding:14px}
.hdr{background:var(--navy);display:flex;align-items:stretch;min-height:56px;border-radius:10px 10px 0 0;overflow:hidden}
.hdr-brand{background:var(--navy2);padding:0 18px;display:flex;align-items:center;gap:11px;border-right:1px solid rgba(255,255,255,.07)}
.hdr-logo{width:36px;height:36px;object-fit:contain;border-radius:4px}
.hdr-name{color:#fff;font-size:12px;font-weight:600}
.hdr-sub{color:var(--gold);font-size:10px}
.hdr-mid{flex:1;display:flex;align-items:center;padding:0 18px;gap:10px}
.hdr-tag{background:rgba(200,164,90,.12);border:1px solid rgba(200,164,90,.25);color:var(--gold2);font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.hdr-date{color:rgba(255,255,255,.35);font-size:11px;font-family:'DM Mono',monospace;margin-left:auto}
.hdr-right{display:flex;align-items:center;gap:12px;padding:0 16px;border-left:1px solid rgba(255,255,255,.07)}
.sdot{width:7px;height:7px;border-radius:50%;background:#38a169}
.sdot.syncing{background:var(--gold);animation:blink 1s infinite}
.sdot.err{background:#fc8181}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.slbl{font-size:10px;color:rgba(255,255,255,.45);font-family:'DM Mono',monospace}
.hdr-uname{color:#fff;font-size:12px;font-weight:500}
.hdr-urole{color:rgba(255,255,255,.4);font-size:10px}
.btn-out{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 12px;border-radius:var(--r);cursor:pointer}
.btn-out:hover{background:rgba(255,255,255,.14);color:#fff}
.nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;padding:0 6px}
.nbtn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:0 15px;height:43px;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.nbtn:hover{color:var(--text)}
.nbtn.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}
.npip{width:6px;height:6px;border-radius:50%;background:var(--gold);display:none}
.nbtn.active .npip{display:block}
.body{background:var(--bg);padding:17px;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;min-height:480px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:var(--rlg);padding:13px 15px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.cn::after{background:var(--navy)}.kpi.cg::after{background:#38a169}.kpi.cr::after{background:#e53e3e}.kpi.ca::after{background:#d69e2e}.kpi.cb::after{background:#3182ce}.kpi.cgo::after{background:var(--gold)}
.kpi-l{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-v{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.kpi-s{font-size:10px;color:var(--muted);margin-top:4px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--rlg);margin-bottom:13px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-hd{padding:12px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;background:#fafbfc}
.card-hd h3{font-size:13px;font-weight:600;color:var(--navy)}
.card-hd-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.toolbar{padding:9px 17px;border-bottom:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:#fcfcfd}
.toolbar input,.toolbar select{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--text);outline:none}
.toolbar input{flex:1;min-width:130px}
.toolbar input:focus,.toolbar select:focus{border-color:var(--navy)}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 13px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:#f1f5f9}
.btn-p{background:var(--navy);color:#fff;border-color:var(--navy)}.btn-p:hover{background:var(--navy2)}
.btn-e{background:var(--navy2);color:#fff;border-color:var(--navy2);font-size:11px;padding:4px 11px}.btn-e:hover{background:var(--navy)}
.btn-won{background:#276749;color:#fff;border-color:#276749;font-size:10px;padding:3px 8px}
.btn-won:hover{background:#1e5238}
.btn-sm{font-size:11px;padding:3px 9px}
.btn-g{background:none;border:none;padding:3px 6px;color:var(--muted);cursor:pointer;border-radius:4px;font-size:14px}.btn-g:hover{background:var(--bg);color:var(--text)}
.btn-d{background:none;border:none;padding:3px 6px;color:#fc8181;cursor:pointer;border-radius:4px;font-size:14px}.btn-d:hover{background:var(--red-bg);color:var(--red)}
.tw{overflow-x:auto}
.sticky-col{position:sticky;right:0;background:#fff;box-shadow:-2px 0 4px rgba(0,0,0,.06)}
tr:hover .sticky-col{background:#f8fafc}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:auto}
.tw table{min-width:900px}
th{text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:10px 16px;border-bottom:1px solid var(--border);background:#fafbfc;white-space:nowrap}
td{padding:10px 16px;border-bottom:1px solid #f0f2f5;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.mono{font-family:'DM Mono',monospace;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;white-space:nowrap;border:1px solid transparent}
.b-lead{background:var(--blue-bg);color:var(--blue);border-color:#bee3f8}
.b-quoted{background:var(--amber-bg);color:var(--amber);border-color:#fcd34d}
.b-won{background:var(--green-bg);color:var(--green);border-color:#c6f6d5}
.b-lost{background:var(--red-bg);color:var(--red);border-color:#fed7d7}
.b-open{background:var(--blue-bg);color:var(--blue);border-color:#bee3f8}
.b-prog{background:var(--amber-bg);color:var(--amber);border-color:#fcd34d}
.b-done{background:var(--green-bg);color:var(--green);border-color:#c6f6d5}
.b-inv{background:#f7fafc;color:#4a5568;border-color:#e2e8f0}
.b-paid{background:var(--green-bg);color:var(--green);border-color:#c6f6d5}
.b-out{background:var(--amber-bg);color:var(--amber);border-color:#fcd34d}
.b-bu{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border);font-size:10px}
.b-recv{background:var(--green-bg);color:var(--green);border-color:#c6f6d5}
.b-pend{background:var(--amber-bg);color:var(--amber);border-color:#fcd34d}
.sla-ok{color:#276749;font-weight:700;font-family:'DM Mono',monospace;font-size:11px}
.sla-warn{color:#d97706;font-weight:700;font-family:'DM Mono',monospace;font-size:11px}
.sla-late{color:#c53030;font-weight:700;font-family:'DM Mono',monospace;font-size:11px}
.pp{color:#276749;font-weight:600;font-family:'DM Mono',monospace;font-size:11px}
.pn{color:#c53030;font-weight:600;font-family:'DM Mono',monospace;font-size:11px}
.ob{color:#c53030;font-weight:600}
.mov{position:fixed;inset:0;background:rgba(10,18,26,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:#fff;border-radius:12px;padding:22px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto}
.mtitle{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:15px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mfr{margin-bottom:11px}
.mfr label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.mfr input,.mfr select,.mfr textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r);outline:none}
.mfr input:focus,.mfr select:focus,.mfr textarea:focus{border-color:var(--navy)}
.mfr textarea{height:52px;resize:vertical}
.mfoot{display:flex;justify-content:flex-end;gap:7px;margin-top:17px;padding-top:13px;border-top:1px solid var(--border)}
.cov{position:fixed;inset:0;background:rgba(10,18,26,.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.cbox{background:#fff;border-radius:12px;padding:22px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.cbox h4{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:7px}
.cbox p{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.cbtns{display:flex;gap:7px;justify-content:flex-end}
.btn-del{background:var(--red-bg);color:var(--red);border:1px solid #fed7d7}.btn-del:hover{background:#fed7d7}
#toast{position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;transform:translateY(6px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ts{background:#276749;color:#fff}
#toast.te{background:#9b1c1c;color:#fff}
#toast.ti{background:var(--navy);color:#fff}
.empty{text-align:center;padding:32px;color:#a0aec0;font-size:12px}
.alert-a{background:var(--amber-bg);border:1px solid #fcd34d;border-radius:var(--r);padding:10px 15px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:9px;flex-wrap:wrap;font-size:12px;font-weight:500;color:var(--amber)}
.info-box{background:#f4f6f9;border-radius:6px;padding:11px;margin-bottom:11px;font-size:12px}
.info-box-title{font-weight:600;margin-bottom:5px;color:#0f1923}
.info-box-sub{color:#718096}
</style>
</head>

<script>
var SB='https://egcmleyqbtjdwuspgbsi.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnY21sZXlxYnRqZHd1c3BnYnNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwOTQ3MDgsImV4cCI6MjA5NDY3MDcwOH0.Bc43J1OzmTKaVNCdKT1bXvIfak1jcxmCqVuyJKZINfw';
var RHDRS={'apikey':KEY,'Authorization':'Bearer '+KEY};
var WHDRS={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};
var BUS=['Fabrication','Construction','Pumps','TMM','Motors','Wear Protection','Mining Supplies','Laser Cutting'];
var USERS=[
  {u:'martin',p:'MM@Admin2026',name:'Martin Spies',role:'CEO'},
  {u:'estimator',p:'MM@Est2026',name:'Estimator',role:'Estimator'},
  {u:'sales',p:'MM@Sales2026',name:'Internal Sales',role:'Sales'},
  {u:'ops',p:'MM@Ops2026',name:'Operations Manager',role:'Operations'},
  {u:'finance',p:'MM@Fin2026',name:'Finance',role:'Finance'},
  {u:'buyer',p:'MM@Buy2026',name:'Buyer',role:'Buyer'}
];
var leads=[],orders=[],spos=[],jcs=[],invs=[],cUser=null;

function dbGet(t,q){
  var url=SB+'/rest/v1/'+t+'?order=created_at.desc'+(q?'&'+q:'');
  return fetch(url,{headers:RHDRS}).then(function(r){return r.ok?r.json():[];});
}
function dbPost(t,b){
  return fetch(SB+'/rest/v1/'+t,{method:'POST',headers:WHDRS,body:JSON.stringify(b)}).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.message||'Error');});
    return r.json();
  });
}
function dbPatch(t,q,b){
  return fetch(SB+'/rest/v1/'+t+'?'+q,{method:'PATCH',headers:WHDRS,body:JSON.stringify(b)}).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.message||'Error');});
    return r.json();
  });
}
function dbDel(t,q){
  return fetch(SB+'/rest/v1/'+t+'?'+q,{method:'DELETE',headers:RHDRS});
}

function loadAll(){
  sync(true,'Loading...');
  return Promise.all([dbGet('leads'),dbGet('orders'),dbGet('supplier_pos'),dbGet('job_cards'),dbGet('invoices')]).then(function(res){
    leads=res[0];orders=res[1];spos=res[2];jcs=res[3];invs=res[4];
    sync(false,'Live');
  }).catch(function(e){sync(false,'Error',true);toast('Load error: '+e.message,'e');});
}

function doLogin(){
  var u=document.getElementById('lu').value.trim().toLowerCase();
  var p=document.getElementById('lp').value;
  var m=null;
  for(var i=0;i<USERS.length;i++){if(USERS[i].u===u&&USERS[i].p===p){m=USERS[i];break;}}
  if(!m){document.getElementById('lerr').style.display='block';return;}
  cUser=m;
  try{sessionStorage.setItem('mm',JSON.stringify(m));}catch(e){}
  launch();
}

function logout(){
  try{sessionStorage.removeItem('mm');}catch(e){}
  cUser=null;
  document.getElementById('app').style.display='none';

var R=function(v){return 'R\u202f'+(Math.round(v||0)).toLocaleString('en-ZA');};
var td=function(){return new Date().toISOString().split('T')[0];};
var dd=function(d){return Math.round((new Date(d)-new Date(td()))/86400000);};
var fd=function(d){return d?String(d).split('-').reverse().join('/'):'—';};
var gv=function(id){var e=document.getElementById(id);return e?e.value:'';};
var fmtD=function(v){if(!v)return null;try{var d=new Date(v);if(isNaN(d.getTime()))return null;return d.toISOString().split('T')[0];}catch(e){return null;}};
var buO=function(s){return BUS.map(function(b){return '<option'+(b===s?' selected':'')+'>'+b+'</option>';}).join('');};
var buS=function(id,s){return '<select id="'+id+'">'+buO(s)+'</select>';};

function sla(due,status){
  if(!due||['Completed','Won','Lost','Moved'].indexOf(status)>=0)return '';
  var d=dd(due);
  if(d<0)return '<span class="sla-late">'+Math.abs(d)+'d late</span>';
  if(d===0)return '<span class="sla-warn">Today</span>';
  return '<span class="sla-ok">'+d+'d left</span>';
}
function lbadge(s){var m={Lead:'b-lead',Quoted:'b-quoted',Won:'b-won',Lost:'b-lost',Moved:'b-inv'};return '<span class="badge '+(m[s]||'b-lead')+'">'+s+'</span>';}
function obadge(s){var m={Open:'b-open','In progress':'b-prog',Completed:'b-done'};return '<span class="badge '+(m[s]||'b-open')+'">'+s+'</span>';}

var _tt;
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='show t'+(type||'i');
  clearTimeout(_tt);_tt=setTimeout(function(){t.className='';},3000);
}

function xlx(data,cols,file,sheet){
  var ws=XLSX.utils.aoa_to_sheet([cols.map(function(c){return c.l;}),].concat(data.map(function(r){return cols.map(function(c){return r[c.k]!==undefined?r[c.k]:'';})})));
  ws['!cols']=cols.map(function(c){return {wch:c.w||14};});

function rDash(){
  var pipe=leads.filter(function(l){return l.status==='Lead'||l.status==='Quoted';}).reduce(function(s,l){return s+(+l.quote_val||0);},0);
  var won=leads.filter(function(l){return l.status==='Won'||l.status==='Moved';}).length;
  var openOrds=orders.filter(function(o){return !o.invoiced;});
  var openV=openOrds.reduce(function(s,o){return s+(+o.order_val||0);},0);
  var lateO=openOrds.filter(function(o){return o.due<td();}).length;
  var lateQ=leads.filter(function(l){return l.status==='Lead'&&l.quote_due<td();}).length;
  var invT=invs.reduce(function(s,i){return s+(+i.order_val||0);},0);
  var prof=invs.reduce(function(s,i){return s+(+i.order_val||0)-(+i.mat_cost||0)-(+i.labour_cost||0)-(+i.overheads||0);},0);
  var mg=invT>0?Math.round(prof/invT*100):0;
  var buR=BUS.map(function(bu){
    var v=openOrds.filter(function(o){return o.bu===bu;}).reduce(function(s,o){return s+(+o.order_val||0);},0);
    var n=openOrds.filter(function(o){return o.bu===bu;}).length;
    var ov=openOrds.filter(function(o){return o.bu===bu&&o.due<td();}).length;
    return v>0?'<tr><td style="font-weight:500">'+bu+'</td><td class="mono">'+R(v)+'</td><td style="text-align:center">'+n+'</td><td>'+(ov>0?'<span style="color:#c53030;font-weight:600;font-size:11px">&#9888; '+ov+' overdue</span>':'<span style="color:#276749;font-weight:600;font-size:11px">&#10003; On track</span>')+'</td></tr>':'';
  }).join('');
  return '<div class="kpis"><div class="kpi cgo"><div class="kpi-l">Pipeline value</div><div class="kpi-v">'+R(pipe)+'</div><div class="kpi-s">'+leads.filter(function(l){return l.status==='Lead'||l.status==='Quoted';}).length+' active leads</div></div><div class="kpi cg"><div class="kpi-l">Quotes won</div><div class="kpi-v">'+won+'</div><div class="kpi-s">Jobs secured</div></div><div class="kpi cb"><div class="kpi-l">Open order book</div><div class="kpi-v">'+R(openV)+'</div><div class="kpi-s">'+openOrds.length+' open</div></div><div class="kpi '+(lateO>0?'cr':'cg')+'"><div class="kpi-l">Overdue orders</div><div class="kpi-v">'+lateO+'</div><div class="kpi-s">Past due date</div></div><div class="kpi '+(lateQ>0?'ca':'cg')+'"><div class="kpi-l">Overdue quotes</div><div class="kpi-v">'+lateQ+'</div><div class="kpi-s">3-day SLA</div></div><div class="kpi '+(mg>15?'cg':mg>0?'ca':'cr')+'"><div class="kpi-l">Gross margin</div><div class="kpi-v">'+mg+'%</div><div class="kpi-s">Invoiced work</div></div></div>'
  +'<div class="card"><div class="card-hd"><h3>Order book by business unit</h3><button class="btn btn-sm" id="refreshBtn">&#8635; Refresh</button></div><div class="tw"><table><thead><tr><th>Business unit</th><th>Open value</th><th style="text-align:center">Orders</th><th>Health</th></tr></thead><tbody>'+(buR||'<tr><td colspan="4" class="empty">No open orders</td></tr>')+'</tbody></table></div></div>'
  +'<div class="card"><div class="card-hd"><h3>Live order feed</h3></div><div class="tw"><table><thead><tr><th>Job #</th><th>Client</th><th>BU</th><th>Value</th><th>Due</th><th>SLA</th><th>Status</th></tr></thead><tbody>'+openOrds.map(function(o){return '<tr><td class="mono">'+o.ref+'</td><td>'+o.client+'</td><td><span class="badge b-bu">'+o.bu+'</span></td><td class="mono">'+R(+o.order_val)+'</td><td class="mono">'+fd(o.due)+'</td><td>'+sla(o.due,o.status)+'</td><td>'+obadge(o.status)+'</td></tr>';}).join('')+'</tbody></table></div></div>';
}

  +'<div class="tw"><table><thead><tr><th>JC ref</th><th>Job #</th><th>BU</th><th>Description</th><th>Assigned</th><th>Bdg Hr</th><th>Act Hr</th><th>Hr Var</th><th>Mat Bdg</th><th>Mat Act</th><th>Mat Var</th><th>Status</th><th class="sticky-col">Actions</th></tr></thead><tbody id="jtb"><tr><td colspan="13" class="empty">Loading...</td></tr></tbody></table></div></div>';

function fJCs(){
  var s=document.getElementById('js')?document.getElementById('js').value.toLowerCase():'';
  var bu=gv('jbu'),st=gv('jst');
  var f=jcs.filter(function(j){
    if(s&&(j.jcref+j.job_ref+j.description+j.assigned).toLowerCase().indexOf(s)<0)return false;
    if(bu&&j.bu!==bu)return false;
    if(st&&j.status!==st)return false;
    return true;
  });
  var tb=document.getElementById('jtb');if(!tb)return;
  if(!f.length){tb.innerHTML='<tr><td colspan="13" class="empty">No job cards match</td></tr>';return;}
  tb.innerHTML=f.map(function(j){

function processPDFPO(file){
  var status=document.getElementById('spoAIStatus');
  var msg=document.getElementById('spoAIMsg');
  if(!status||!msg)return;
  status.style.display='block';
  msg.textContent='📖 Reading your PDF...';

  // Use PDF.js to extract text, then send text to Claude
  var fileURL=URL.createObjectURL(file);
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  pdfjsLib.getDocument(fileURL).promise.then(function(pdf){
    var pages=[];
    var total=pdf.numPages;
    for(var i=1;i<=total;i++){pages.push(i);}
    return Promise.all(pages.map(function(n){
      return pdf.getPage(n).then(function(page){
        return page.getTextContent().then(function(tc){
          return tc.items.map(function(it){return it.str;}).join(' ');
        });
      });
    }));
  }).then(function(pageTexts){
    var pdfText=pageTexts.join('\n');
    msg.textContent='🤖 Claude AI is extracting PO details...';
    var prompt='You are reading a supplier Purchase Order for Mine Minerals Supplies & Services in South Africa. Here is the extracted text from the PO:\n\n'+pdfText+'\n\nExtract the following and return ONLY a raw JSON object, no markdown, no explanation:\n{"spref":"PO reference number","job_ref":"MM job number (MM followed by digits)","supplier":"supplier name","description":"brief summary of items max 120 chars","amount":excl_total_number,"ordered":"YYYY-MM-DD"}\nThe amount must be the Total Exclusive (excl VAT) as a plain number. If not found use 0.';

    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true','x-api-key':'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'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:2000,
        messages:[{role:'user',content:[{type:'text',text:prompt}]}]
      })
    })
    .then(function(r){return r.json();})
    .then(function(data){
      alert('API RESPONSE: '+JSON.stringify(data).substring(0,500));
      var txt='';
      if(data.content&&data.content[0]&&data.content[0].text){txt=data.content[0].text.trim();}
      txt=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
      var jm=txt.match(/\{[\s\S]*\}/);
      if(jm)txt=jm[0];
      var parsed={spref:'SPO-'+String(spos.length+1).padStart(3,'0'),job_ref:'',bu:'',supplier:'',description:'',amount:0,ordered:td()};
      var success=false;

      try{
        var ex=JSON.parse(txt);
        if(ex.spref&&ex.spref.indexOf('PO number')<0)parsed.spref=ex.spref;
        if(ex.job_ref&&ex.job_ref.indexOf('MM job')<0)parsed.job_ref=ex.job_ref;
        if(ex.supplier&&ex.supplier.indexOf('supplier company')<0)parsed.supplier=ex.supplier;
        if(ex.description&&ex.description.indexOf('brief summary')<0)parsed.description=ex.description;
        if(ex.amount){var av=parseFloat(String(ex.amount).replace(/[^0-9.]/g,''));if(av>0)parsed.amount=av;}
        if(ex.ordered){var dm=String(ex.ordered).match(/\d{4}-\d{2}-\d{2}/);if(dm)parsed.ordered=dm[0];}
        success=true;
      }catch(e){alert('PARSE ERROR: '+e.message+' RAW: '+txt.substring(0,200));}
      closeM();
      oSPOForm(parsed,success);
    })
    .catch(function(e){
      msg.textContent='❌ Error reading PDF: '+e.message;
      toast('PDF read failed','e');
    });
  }).catch(function(e){
    msg.textContent='❌ Error reading PDF: '+e.message;
    toast('PDF read failed — try manual entry','e');
  });
}

  +(fromPDF?'<div style="background:#f0fff4;border:1px solid #c6f6d5;border-radius:6px;padding:9px 12px;font-size:11px;color:#276749;margin-bottom:14px">✓ Fields populated from PDF — please review before saving</div>':'')
  +'<div class="f2"><div class="mfr"><label>SPO ref</label><input id="mSr" value="'+(d.spref||'')+'"></div><div class="mfr"><label>Job number (MM ref)</label><input id="mSj" value="'+(d.job_ref||'')+'"></div></div>'
  +'<div class="f2"><div class="mfr"><label>Business unit</label>'+buS('mSb',d.bu||'')+'</div><div class="mfr"><label>Supplier</label><input id="mSs" value="'+(d.supplier||'')+'"></div></div>'
  +'<div class="mfr"><label>Description</label><textarea id="mSd">'+(d.description||'')+'</textarea></div>'
  +'<div class="f2"><div class="mfr"><label>Excl. Amount (R)</label><input type="number" id="mSa" value="'+(d.amount||0)+'"></div><div class="mfr"><label>Date ordered</label><input type="date" id="mSdt" value="'+(d.ordered||td())+'"></div></div>'
  +'<div class="mfoot"><button class="btn" id="cancelSPO">Cancel</button><button class="btn btn-p" id="saveSPO">Save PO</button></div>');

  document.getElementById('cancelSPO').addEventListener('click',closeM);
  document.getElementById('saveSPO').addEventListener('click',function(){
    dbPost('supplier_pos',{spref:gv('mSr'),job_ref:gv('mSj'),bu:gv('mSb'),supplier:gv('mSs'),description:gv('mSd'),amount:+gv('mSa')||0,ordered:fmtD(gv('mSdt')),received:false})
    .then(function(){closeM();return loadAll();}).then(function(){go('buyer');toast('PO saved','s');}).catch(function(e){toast(e.message,'e');});
  });
}

function oJC(editId){
  var j=editId?(function(){for(var i=0;i<jcs.length;i++){if(jcs[i].id===editId)return jcs[i];}return null;})():null;
  var availOrds=editId?orders:getOpenOrders();
  var ordOpts=availOrds.map(function(o){return '<option value="'+o.ref+'"'+(j&&j.job_ref===o.ref?' selected':'')+'>'+o.ref+' — '+o.client+'</option>';}).join('');
  if(!ordOpts)ordOpts='<option value="">No open orders available</option>';
  var initJob=j?j.job_ref:(availOrds.length?availOrds[0].ref:'');
  var initBU=j?j.bu:(availOrds.length?availOrds[0].bu:'');
  var initRef=j?j.jcref:autoJCRef(initJob);
  openM('<div class="mtitle">'+(editId?'Edit job card':'New job card')+'</div>'
  +'<div class="mfr"><label>Order number (MM ref)</label><select id="mJj" onchange="onJCOrderChange()"><option value="">Select open order...</option>'+ordOpts+'</select></div>'
  +'<div class="f2"><div class="mfr"><label>JC ref (auto-generated)</label><input id="mJr" value="'+initRef+'"></div><div class="mfr"><label>Business unit (auto)</label><input id="mJb" value="'+initBU+'" readonly style="background:#f4f6f9"></div></div>'
  +'<div class="mfr"><label>Assigned to</label><input id="mJa" value="'+(j?j.assigned||'':'')+'"></div>'
  +'<div class="mfr"><label>Description</label><input id="mJd" value="'+(j?j.description||'':'')+'"></div>'
  +'<div class="f2"><div class="mfr"><label>Budget hours</label><input type="number" id="mJbh" value="'+(j?j.budget_hrs||0:0)+'"></div><div class="mfr"><label>Actual hours</label><input type="number" id="mJah" value="'+(j?j.actual_hrs||0:0)+'"></div></div>'
  +'<div class="f2"><div class="mfr"><label>Material budget (R)</label><input type="number" id="mJmb" value="'+(j?j.mat_budget||0:0)+'"></div><div class="mfr"><label>Material actual (R)</label><input type="number" id="mJma" value="'+(j?j.mat_actual||0:0)+'"></div></div>'
  +'<div class="mfr"><label>Status</label><select id="mJs">'+['Open','In progress','Completed'].map(function(s){return '<option'+(j&&j.status===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div>'
  +'<div class="mfoot"><button class="btn" id="cancelJC">Cancel</button><button class="btn btn-p" id="saveJC">'+(editId?'Update job card':'Save job card')+'</button></div>');
  document.getElementById('cancelJC').addEventListener('click',closeM);
  document.getElementById('saveJC').addEventListener('click',function(){
    var jobRef=gv('mJj');
    if(!jobRef){toast('Please select an open order','e');return;}
    var ord=null;for(var i=0;i<orders.length;i++){if(orders[i].ref===jobRef){ord=orders[i];break;}}
    var data={jcref:gv('mJr'),job_ref:jobRef,bu:ord?ord.bu:gv('mJb'),description:gv('mJd'),assigned:gv('mJa'),budget_hrs:+gv('mJbh')||0,actual_hrs:+gv('mJah')||0,mat_budget:+gv('mJmb')||0,mat_actual:+gv('mJma')||0,status:gv('mJs')};
    var pr=editId?dbPatch('job_cards','id=eq.'+editId,data):dbPost('job_cards',data);
    pr.then(function(){closeM();return loadAll();}).then(function(){go('jc');toast(editId?'Job card updated':'Job card saved','s');}).catch(function(e){toast(e.message,'e');});
  });
}

function onJCOrderChange(){
  var jobRef=gv('mJj');
  var ord=null;for(var i=0;i<orders.length;i++){if(orders[i].ref===jobRef){ord=orders[i];break;}}
  if(ord){
    document.getElementById('mJb').value=ord.bu;
    document.getElementById('mJr').value=autoJCRef(jobRef);
  }
}

function expLeads(){
  var bu=gv('lbu'),st=gv('lst');
  var f=leads.filter(function(l){return l.status!=='Moved'&&(!bu||l.bu===bu)&&(!st||l.status===st);});
  xlx(f.map(function(l){return {a:l.ref,b:l.client,c:l.bu,d:l.type,e:l.contact,f:fd(l.received),g:fd(l.quote_due),h:l.status,i:+l.quote_val||0,j:l.notes};}),
  [{k:'a',l:'Ref',w:14},{k:'b',l:'Client',w:22},{k:'c',l:'BU',w:18},{k:'d',l:'Type',w:16},{k:'e',l:'Contact',w:18},{k:'f',l:'Received',w:13},{k:'g',l:'Quote Due',w:12},{k:'h',l:'Status',w:10},{k:'i',l:'Quote Value',w:14},{k:'j',l:'Notes',w:30}],
  'MM_Leads.xlsx','New Business');
}
function expOrders(){
  var bu=gv('obu'),st=gv('ost');
  var f=orders.filter(function(o){return !o.invoiced&&(!bu||o.bu===bu)&&(!st||o.status===st);});
  xlx(f.map(function(o){return {a:o.ref,b:o.client,c:o.bu,d:o.type,e:+o.order_val||0,f:fd(o.received),g:fd(o.due),h:o.status,i:o.invoiced?'Yes':'No',j:o.notes};}),
  [{k:'a',l:'Job #',w:10},{k:'b',l:'Client',w:22},{k:'c',l:'BU',w:18},{k:'d',l:'Type',w:16},{k:'e',l:'Value',w:14},{k:'f',l:'Received',w:13},{k:'g',l:'Due',w:12},{k:'h',l:'Status',w:12},{k:'i',l:'Invoiced',w:9},{k:'j',l:'Notes',w:30}],
  'MM_Orders.xlsx','Order Book');
}
function expBuyer(){
  var bu=gv('bbu');
  var f=spos.filter(function(p){return !bu||p.bu===bu;});
  xlx(f.map(function(p){return {a:p.spref,b:p.job_ref,c:p.bu,d:p.supplier,e:p.description,f:+p.amount||0,g:fd(p.ordered),h:p.received?'Received':'Pending'};}),
  [{k:'a',l:'SPO Ref',w:12},{k:'b',l:'Job #',w:10},{k:'c',l:'BU',w:18},{k:'d',l:'Supplier',w:22},{k:'e',l:'Description',w:30},{k:'f',l:'Amount',w:14},{k:'g',l:'Ordered',w:13},{k:'h',l:'Status',w:12}],
  'MM_Buyer.xlsx','Supplier POs');
}
function expJC(){
  var bu=gv('jbu'),st=gv('jst');
  var f=jcs.filter(function(j){return (!bu||j.bu===bu)&&(!st||j.status===st);});
  xlx(f.map(function(j){var hV=(+j.actual_hrs||0)-(+j.budget_hrs||0),mV=(+j.mat_actual||0)-(+j.mat_budget||0);return {a:j.jcref,b:j.job_ref,c:j.bu,d:j.description,e:j.assigned,f:+j.budget_hrs||0,g:+j.actual_hrs||0,h:hV,i:+j.mat_budget||0,j:+j.mat_actual||0,k:mV,l:j.status};}),
  [{k:'a',l:'JC Ref',w:12},{k:'b',l:'Job #',w:10},{k:'c',l:'BU',w:18},{k:'d',l:'Description',w:28},{k:'e',l:'Assigned',w:18},{k:'f',l:'Bdg Hrs',w:10},{k:'g',l:'Act Hrs',w:10},{k:'h',l:'Hrs Var',w:10},{k:'i',l:'Mat Bdg',w:14},{k:'j',l:'Mat Act',w:14},{k:'k',l:'Mat Var',w:14},{k:'l',l:'Status',w:12}],
  'MM_JobCards.xlsx','Job Cards');
}
function oInv(id){
  var i=null;for(var x=0;x<invs.length;x++){if(invs[x].id===id){i=invs[x];break;}}
  if(!i)return;
  openM('<div class="mtitle">Edit invoice</div>'
  +'<div class="f2"><div class="mfr"><label>Invoice ref</label><input id="eIr" value="'+(i.inv_ref||'')+'"></div><div class="mfr"><label>Invoice date</label><input type="date" id="eId" value="'+(i.invoiced_date||'')+'"></div></div>'
  +'<div class="f2"><div class="mfr"><label>Client</label><input id="eIc" value="'+(i.client||'')+'" readonly style="background:#f4f6f9"></div><div class="mfr"><label>Invoice value (R)</label><input type="number" id="eIv" value="'+(i.order_val||0)+'"></div></div>'
  +'<div class="f2"><div class="mfr"><label>Material cost (R)</label><input type="number" id="eIm" value="'+(i.mat_cost||0)+'"></div><div class="mfr"><label>Labour cost (R)</label><input type="number" id="eIl" value="'+(i.labour_cost||0)+'"></div></div>'
  +'<div class="f2"><div class="mfr"><label>Overheads (R)</label><input type="number" id="eIo" value="'+(i.overheads||0)+'"></div><div class="mfr"><label>Status</label><select id="eIs"><option'+(i.status==='Outstanding'?' selected':'')+'>Outstanding</option><option'+(i.status==='Paid'?' selected':'')+'>Paid</option></select></div></div>'
  +'<div class="mfoot"><button class="btn" id="cancelInvE">Cancel</button><button class="btn btn-p" id="saveInvE">Update invoice</button></div>');
  document.getElementById('cancelInvE').addEventListener('click',closeM);
  document.getElementById('saveInvE').addEventListener('click',function(){
    var data={inv_ref:gv('eIr'),order_val:+gv('eIv')||0,mat_cost:+gv('eIm')||0,labour_cost:+gv('eIl')||0,overheads:+gv('eIo')||0,invoiced_date:fmtD(gv('eId')),status:gv('eIs')};
    dbPatch('invoices','id=eq.'+id,data).then(function(){closeM();return loadAll();}).then(function(){go('fin');toast('Invoice updated','s');}).catch(function(e){toast(e.message,'e');});
  });
}

function expFin(){
  var bu=gv('fbu');
  var f=invs.filter(function(i){return !bu||i.bu===bu;});
  xlx(f.map(function(i){var p=(+i.order_val||0)-(+i.mat_cost||0)-(+i.labour_cost||0)-(+i.overheads||0);var m=(+i.order_val||0)>0?Math.round(p/(+i.order_val||1)*100):0;return {a:i.inv_ref,b:i.job_ref,c:i.client,d:i.bu,e:+i.order_val||0,f:+i.mat_cost||0,g:+i.labour_cost||0,h:+i.overheads||0,i:p,j:m+'%',k:fd(i.invoiced_date),l:i.status};}),
  [{k:'a',l:'Invoice Ref',w:14},{k:'b',l:'Job #',w:10},{k:'c',l:'Client',w:22},{k:'d',l:'BU',w:18},{k:'e',l:'Value',w:16},{k:'f',l:'Mat Cost',w:14},{k:'g',l:'Labour',w:14},{k:'h',l:'Overhead',w:14},{k:'i',l:'Profit',w:14},{k:'j',l:'Margin',w:10},{k:'k',l:'Date',w:13},{k:'l',l:'Status',w:12}],
  'MM_Finance.xlsx','Finance');
}

document.addEventListener('click',function(e){
  var tid=e.target.id;
  if(tid==='addLeadBtn'){oLead(null);return;}
  if(tid==='addOrderBtn'){oOrder(null);return;}
  if(tid==='addSPOBtn'){oSPO(null);return;}
  if(tid==='addJCBtn'){oJC(null);return;}
  if(tid==='expLeadsBtn'){expLeads();return;}
  if(tid==='expOrdersBtn'){expOrders();return;}
  if(tid==='expBuyerBtn'){expBuyer();return;}
  if(tid==='expJCBtn'){expJC();return;}
  if(tid==='expFinBtn'){expFin();return;}
  if(tid==='refreshBtn'){loadAll().then(function(){go('dash');});return;}
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.getAttribute('data-action');
  var id=el.getAttribute('data-id');
  if(action==='wonToOrder')wonToOrder(id);
  if(action==='toFinance')toFinance(id);
  if(action==='editLead')oLead(id);
  if(action==='delLead')cfm('Delete lead','Permanently delete this lead?',function(){dbDel('leads','id=eq.'+id).then(function(){return loadAll();}).then(function(){go('leads');toast('Deleted','s');});});
  if(action==='editOrder')oOrder(id);
  if(action==='delOrder')cfm('Delete order','Permanently delete this order?',function(){dbDel('orders','id=eq.'+id).then(function(){return loadAll();}).then(function(){go('orders');toast('Deleted','s');});});
  if(action==='togSPO'){var p=null;for(var i=0;i<spos.length;i++){if(spos[i].id===id){p=spos[i];break;}}if(p)dbPatch('supplier_pos','id=eq.'+id,{received:!p.received}).then(function(){return loadAll();}).then(function(){go('buyer');toast('Updated','s');});}
  if(action==='editSPO')oSPO(id);
  if(action==='delSPO')cfm('Delete PO','Permanently delete?',function(){dbDel('supplier_pos','id=eq.'+id).then(function(){return loadAll();}).then(function(){go('buyer');toast('Deleted','s');});});
  if(action==='editJC')oJC(id);
  if(action==='delJC')cfm('Delete job card','Permanently delete?',function(){dbDel('job_cards','id=eq.'+id).then(function(){return loadAll();}).then(function(){go('jc');toast('Deleted','s');});});
  if(action==='editInv')oInv(id);
  if(action==='delInv')cfm('Delete invoice','Permanently delete?',function(){dbDel('invoices','id=eq.'+id).then(function(){return loadAll();}).then(function(){go('fin');toast('Deleted','s');});});
  if(action==='addLead')oLead(null);
  if(action==='addOrder')oOrder(null);
  if(action==='addSPO')oSPO();
  if(action==='addJC')oJC();
  if(action==='expLeads')expLeads();
  if(action==='expOrders')expOrders();
  if(action==='expBuyer')expBuyer();
  if(action==='expJC')expJC();
  if(action==='expFin')expFin();
  if(action==='refresh')loadAll().then(function(){go('dash');});
});

document.addEventListener('change',function(e){
  var el=e.target;
  if(el.id==='ls'||el.id==='lbu'||el.id==='lst')fLeads();
  if(el.id==='os'||el.id==='obu'||el.id==='ost')fOrders();
  if(el.id==='jbu'||el.id==='jst')fJCs();
  if(el.id==='bbu'||el.id==='bst'){var tb=document.getElementById('btb');if(tb)tb.innerHTML=rSPOrows();}
});
document.addEventListener('input',function(e){
  var el=e.target;
  if(el.id==='ls')fLeads();
  if(el.id==='os')fOrders();
  if(el.id==='js')fJCs();
  if(el.id==='bs'){var tb=document.getElementById('btb');if(tb)tb.innerHTML=rSPOrows();}
});

function getOpenOrders(){return orders.filter(function(o){return !o.invoiced&&o.status!=='Completed';});}
function autoJCRef(jobRef){if(!jobRef)return 'JC-001';var existing=jcs.filter(function(j){return j.job_ref===jobRef;});return jobRef+'-JC'+String(existing.length+1).padStart(2,'0');}

window.onload=function(){
  var s=null;try{s=sessionStorage.getItem('mm');}catch(e){}
  if(s){try{cUser=JSON.parse(s);launch();}catch(e){}}
};
</script>
